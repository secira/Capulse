{# Site-wide Beta banner — always visible during beta period. #}
<div id="beta-invite-banner" role="status" aria-live="polite"
     style="background:linear-gradient(90deg,#7c3aed 0%,#2563eb 100%);
            color:#fff; font-family:'Poppins',sans-serif; font-size:13px;
            font-weight:500; text-align:center; padding:8px 16px;
            border-bottom:1px solid rgba(255,255,255,0.15);
            position:relative; z-index:1040; letter-spacing:0.01em;">
    <span style="display:inline-block; background:rgba(255,255,255,0.18);
                 padding:2px 8px; border-radius:4px; font-size:11px;
                 font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
                 margin-right:8px;">BETA</span>
    Welcome to Target Capital — India's AI-powered trading decision engine.
    {% if not current_user.is_authenticated %}
        <a href="{{ url_for('register') }}"
           style="color:#fff; text-decoration:underline; font-weight:600; margin-left:6px;">Create a free account</a>
        &nbsp;·&nbsp;
        <a href="{{ url_for('login') }}"
           style="color:#fff; text-decoration:underline; font-weight:600;">Sign in</a>
    {% endif %}
</div>
