<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Broker connected</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
         display:flex;align-items:center;justify-content:center;
         height:100vh;margin:0;background:#0b1220;color:#e2e8f0;text-align:center}
    .card{padding:2rem 2.5rem;border-radius:12px;background:#111827;
          box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:420px}
    .icon{font-size:3rem;color:#22c55e;margin-bottom:.5rem}
    .muted{color:#94a3b8;font-size:.9rem;margin-top:.5rem}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h3 style="margin:0">{{ broker_name or 'Broker' }} connected!</h3>
    <p class="muted">{{ success_message or 'This window will close automatically.' }}</p>
    <p class="muted">Refreshing your Capulse tab…</p>
  </div>
  <script>
    (function(){
      try {
        if (window.opener && !window.opener.closed) {
          // Reload the opener tab so it shows the updated connection status
          window.opener.location.reload();
          // Also post a message in case Trade Now page is listening
          try {
            window.opener.postMessage(
              { type: 'broker-reauth-success', account_id: {{ account_id|tojson }} },
              '*'
            );
          } catch(e) {}
        }
      } catch (e) { /* opener gone — fine */ }
      // Close this new tab after a short delay so the user sees the success message
      setTimeout(function(){ try { window.close(); } catch(e){} }, 1500);
    })();
  </script>
</body>
</html>
